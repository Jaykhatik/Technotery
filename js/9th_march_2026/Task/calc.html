<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arr = [1, 4, 5, 7, 19]
        let max = arr[0]
        let min = arr[0]
        for (let num of arr) {
            if (num > max) {
                max = num
            }
            else if (num < min) {
                min = num
            }
        }
        console.log(max)
        console.log(min)


        let numbers = [100, 200, 63, 40]
        let even = numbers.filter((a) => {
            return a % 2 == 0;
        })
        let sum = numbers.reduce((a, b) => {
            return a + b;
        })
        console.log(even)
        console.log(sum)


    </script>
</body>
