    Definition :-
        -> The DOM (Document Object Model) is a programming interface that represents an HTML

        -> JavaScript uses the DOM to:
            ● Access HTML elements
            ● Modify content
            ● Change styles
            ● Add or Remove Elements
            ● Handle Events




    DOM tree structure:-
        ->Any node has relationship to other nodes in the DOM tree ,and it is same as described in the traditional family tree.

            Document
                |
                html
                |---- head
                |      |---- title

                |---- body

                        |---- p
