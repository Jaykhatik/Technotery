<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Iteration Methods</title>
</head>

<body>
    <script>
        //1)forEach() : The forEach() method calls a function (a callback function) once for each array element.
        const numbers = [45, 7, 9, 20, 30];
        numbers.forEach(function (num) {
            console.log(num * 10);
        })

        numbers.forEach(function (value, index, array) {
            array[index] = value * 2;
        })
        console.log(numbers)

        let users = [
            { name: "Jay", age: 22 },
            { name: "Rahul", age: 25 }
        ];

        users.forEach(function (user) {
            console.log(user.name);
        });

        //2)map() : Returns NEW modified array
        let arr = [1, 2, 3, 4, 5];
        let square = arr.map(a => a * 4);
        console.log(square)

        //3)filter() : The filter() method creates a new array with array elements that pass a test.
        const n1 = [10, 6, 9, 23, 65];
        const new1 = n1.filter(n => n >= 8);
        console.log(new1);
        new1.sort((a, b) => {
            return a - b;
        })
        console.log(new1);

        //4)reduce() : it is used to combine the elements into single value.
        let nums = [1, 2, 3, 4];
        let sum = nums.reduce((a, b) => {
            return a + b
        })
        console.log(sum)

        //5)entries() : Create an Array Iterator, and then iterate over the key/value pairs.
        const fruits = ["Banana", "Orange", "Apple", "Mango"];
        const f = fruits.entries();
        for (let x of f) {
            console.log(x)
        }

        //6)spread(...) :- The ... operator expands an array into individual elements.
        const arr1 = [1, 2, 3];
        const arr2 = [4, 5, 6];

        const arr3 = [...arr1, ...arr2];
        console.log(arr3);

        let minvalue = Math.min(...arr1);
        let maxvalue = Math.max(...arr2);
        console.log(minvalue)
        console.log(maxvalue);

        //7)rest(...) parameter :   The rest operator (...) allows us to destruct an array and collect the leftovers.
        let numbers1 = [10, 20, 30, 40, 50];

        let [a, ...b] = numbers1;

        console.log(a);  
        console.log(b);  // [20, 30, 40, 50]

        //8)from() : make anything into an array
        console.log(Array.from("jaykhatik"));

        //9)of()
        let e1=100;
        let e2=200;
        let e3=400;
        console.log(Array.of(e1,e2,e3))

    </script>
</body>

</html>
