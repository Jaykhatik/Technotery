<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array's Basic</title>
</head>

<body>
    <!-- 

    ->it is a collection of multiple items under a single variable name. 

    -->
    <ul id="list"></ul>
    <script>
        //creating arrays
        const arr = [1, 2, 3, 4, 5, 10];
        console.log(arr[3])

        const arr1 = ["one", "two", "three", "four"]
        console.log(arr1[0])
        console.log(arr1[arr1.length - 1]);//accessing last element

        const arr2 = new Array(5, 6, 7, "jay");
        console.log(arr2[3])


        //You can also create an empty array, and provide elements later:
        const arr3 = [];
        arr3[0] = 10;
        arr3[1] = 20;
        console.log(arr3);
        arr3[0] = 30;//changing the value of 0 index
        console.log(arr3)

        //converting array into strings

        const arr4 = ["apple", "banana"];
        console.log(arr4.toString())



        //looping array elements
        const arr5 = ["rahul", "jay", "prashant", "rajesh", "kunal"];
        console.log(arr5.length);

        for (let i = 0; i < arr5.length; i++) {
            document.getElementById("list").innerHTML +=
                "<li>" + arr5[i] + "</li>";
        }


        //using typeOf
        const arr6 = ["star", "moon", "sun"];
        console.log(typeof (arr6))
        console.log(typeof (arr6[0]))


    </script>
</body>

</html>
